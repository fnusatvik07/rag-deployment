name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Job 1: Linting ────────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install ruff
        run: pip install ruff

      - name: Ruff lint
        run: ruff check app/ main.py tests/

      - name: Ruff format
        run: ruff format --check app/ main.py tests/

  # ── Job 2: Unit Tests ─────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: |
          uv venv .venv
          . .venv/bin/activate
          uv pip install .
          uv pip install pytest pytest-cov httpx ruff

      - name: Run tests with coverage
        env:
          PINECONE_API_KEY: ${{ secrets.PINECONE_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          . .venv/bin/activate
          python -m pytest tests/ -v --cov=app --cov=main --cov-report=term-missing --cov-fail-under=80

  # ── Job 3: Build Docker Image ─────────────────────────────────────
  docker:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t rag-classic:${{ github.sha }} .
