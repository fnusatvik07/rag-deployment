# CD Pipeline - Deploy to Google Cloud Run on push to main

name: "Deploy: GCP"

on:
  push:
    branches: [main]

env:
  GCP_PROJECT_ID: rag-deployment-493815
  GCP_REGION: us-central1
  IMAGE: us-central1-docker.pkg.dev/rag-deployment-493815/rag-classic/rag-classic
  SERVICE_NAME: rag-classic

jobs:
  # ---- Job 1: CI checks (must pass before deploy) ----
  ci:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          pip install uv
          uv venv .venv
          . .venv/bin/activate
          uv pip install .
          uv pip install ruff pytest pytest-cov httpx

      - name: Lint
        run: |
          . .venv/bin/activate
          ruff check app/ main.py tests/
          ruff format --check app/ main.py tests/

      - name: Test
        env:
          PINECONE_API_KEY: ${{ secrets.PINECONE_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          . .venv/bin/activate
          pytest tests/ -v --cov=app --cov=main --cov-fail-under=80

  # ---- Job 2: Build & Deploy ----
  deploy:
    name: Deploy to Cloud Run
    needs: [ci]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build Docker image
        run: docker build -t $IMAGE:$GITHUB_SHA -t $IMAGE:latest .

      - name: Push Docker image
        run: |
          docker push $IMAGE:$GITHUB_SHA
          docker push $IMAGE:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy $SERVICE_NAME \
            --image $IMAGE:$GITHUB_SHA \
            --region $GCP_REGION \
            --platform managed \
            --allow-unauthenticated \
            --set-env-vars "^##^PINECONE_API_KEY=${{ secrets.PINECONE_API_KEY }}##OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}##LANGSMITH_TRACING=true##LANGSMITH_ENDPOINT=https://api.smith.langchain.com##LANGSMITH_API_KEY=${{ secrets.LANGSMITH_API_KEY }}##LANGSMITH_PROJECT=rag-deployment" \
            --memory 2Gi \
            --cpu 2 \
            --min-instances 0 \
            --max-instances 3 \
            --timeout 300 \
            --cpu-boost \
            --quiet

      - name: Show deployed URL
        run: |
          URL=$(gcloud run services describe $SERVICE_NAME --region $GCP_REGION --format 'value(status.url)')
          echo "🚀 Deployed to: $URL"
          echo "   Health: $URL/health"
          echo "   Docs: $URL/docs"
