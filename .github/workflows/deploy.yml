name: Deploy to Cloud Run

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  GCP_PROJECT_ID: rag-pipeline-487306
  GCP_REGION: us-central1
  SERVICE_NAME: rag-classic
  IMAGE: us-central1-docker.pkg.dev/rag-pipeline-487306/rag-classic/rag-classic

jobs:
  # ── Job 1: Lint & basic checks ─────────────────────────────────────────────
  test:
    name: Lint & Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          pip install uv
          uv venv .venv
          . .venv/bin/activate
          uv pip install .

      - name: Check imports
        run: |
          . .venv/bin/activate
          python -c "from app.config import PINECONE_INDEX_NAME; print('✅ Imports OK')"

      - name: Syntax check all modules
        run: |
          . .venv/bin/activate
          python -m py_compile app/config.py
          python -m py_compile app/ingestion.py
          python -m py_compile app/embedding.py
          python -m py_compile app/retrieval.py
          python -m py_compile app/reranker.py
          python -m py_compile app/generation.py
          python -m py_compile app/api.py
          python -m py_compile main.py
          echo "✅ All modules compile successfully"

  # ── Job 2: Build & Deploy to Cloud Run ─────────────────────────────────────
  deploy:
    name: Build & Deploy
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build Docker image
        run: docker build -t $IMAGE:$GITHUB_SHA -t $IMAGE:latest .

      - name: Push Docker image
        run: |
          docker push $IMAGE:$GITHUB_SHA
          docker push $IMAGE:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy $SERVICE_NAME \
            --image $IMAGE:$GITHUB_SHA \
            --region $GCP_REGION \
            --platform managed \
            --allow-unauthenticated \
            --set-env-vars "PINECONE_API_KEY=${{ secrets.PINECONE_API_KEY }},OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" \
            --memory 512Mi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 3 \
            --timeout 60 \
            --quiet

      - name: Show deployed URL
        run: |
          URL=$(gcloud run services describe $SERVICE_NAME --region $GCP_REGION --format 'value(status.url)')
          echo "🚀 Deployed to: $URL"
          echo "   Health check: $URL/health"
          echo "   Swagger docs: $URL/docs"
